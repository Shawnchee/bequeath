[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
evm_version = "cancun"
bytecode_hash = "none"
ffi = true
optimizer = true
optimizer_runs = 800
via_ir = false

[profile.default.fuzz]
runs = 256

# Linting matches the v4-template default — silences hookathon lint noise.
[lint]
exclude_lints = ["screaming-snake-case-immutable", "screaming-snake-case-const"]
lint_on_build = false
